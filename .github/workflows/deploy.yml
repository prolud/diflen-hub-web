name: deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: windows-latest
    environment: production
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare deployment files
        shell: pwsh
        run: |
          # Create publish directory
          New-Item -ItemType Directory -Path ./publish -Force | Out-Null

          # Copy build output
          Copy-Item -Path ./.next -Destination ./publish/.next -Recurse
          Copy-Item -Path ./public -Destination ./publish/public -Recurse -ErrorAction SilentlyContinue
          Copy-Item -Path ./package.json -Destination ./publish/package.json
          Copy-Item -Path ./package-lock.json -Destination ./publish/package-lock.json -ErrorAction SilentlyContinue
          Copy-Item -Path ./node_modules -Destination ./publish/node_modules -Recurse

      - name: Deploy to IIS
        uses: ChristopheLav/iis-deploy@v1
        with:
          msdeploy-service-url: https://${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PORT }}
          website-name: ${{ secrets.SERVER_SITE }}
          msdeploy-username: ${{ secrets.SERVER_LOGIN }}
          msdeploy-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: ./publish
